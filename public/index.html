<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap HQ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #12141B; color: #ECEDF1; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input, select, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root" style="padding: 20px; color: #ECEDF1;"></div>
  
  <script>
    // Simple test - no React needed
    const root = document.getElementById('root');
    root.innerHTML = `
      <h1>Bootstrap HQ</h1>
      <p>Dashboard is loading...</p>
      <div style="margin-top: 20px;">
        <input type="text" placeholder="Test input" style="padding: 8px; background: #1B1E28; color: #ECEDF1; border: 1px solid #2E323F; width: 200px;">
        <button onclick="alert('Button works!')" style="padding: 8px 16px; background: #E8A33D; color: #12141B; border: none; cursor: pointer; margin-left: 10px;">Click me</button>
      </div>
    `;
  </script>
</body>
</html>
