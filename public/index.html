<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap HQ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #12141B; color: #ECEDF1; font-family: system-ui, -apple-system, sans-serif; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 200px; background: #1B1E28; border-right: 1px solid #2E323F; padding: 20px; overflow-y: auto; }
    .main { flex: 1; padding: 28px; overflow-y: auto; }
    .title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .nav-btn { width: 100%; text-align: left; padding: 10px; border: none; background: transparent; color: #8A8F9C; margin-bottom: 6px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .nav-btn.active { background: #232733; color: #ECEDF1; font-weight: 600; }
    .hidden { display: none !important; }
    .card { background: #1B1E28; border: 1px solid #2E323F; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-value { font-size: 20px; font-weight: 700; font-family: monospace; margin-top: 6px; }
    .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 12px; }
    input, select { background: #232733; border: 1px solid #2E323F; color: #ECEDF1; border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; }
    button { background: #E8A33D; color: #12141B; border: none; border-radius: 6px; padding: 9px 14px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; }
    .expense-row { display: flex; justify-content: space-between; padding: 10px 12px; background: #232733; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
    .amount { color: #E8615A; font-family: monospace; }
    .cust-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .section-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .small-text { font-size: 12px; color: #8A8F9C; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="title">Bootstrap HQ</div>
      <button class="nav-btn active" onclick="showTab('dashboard', this)">Dashboard</button>
      <button class="nav-btn" onclick="showTab('finances', this)">Finances</button>
      <button class="nav-btn" onclick="showTab('customers', this)">Customers</button>
      <button class="nav-btn" onclick="showTab('roadmap', this)">Roadmap</button>
    </div>

    <div class="main">
      <!-- Dashboard -->
      <div id="tab-dashboard">
        <div class="section-title">Dashboard</div>
        <div class="stat-grid">
          <div class="card"><div class="small-text">Cash on hand</div><div class="stat-value" id="stat-cash">$0</div></div>
          <div class="card"><div class="small-text">MRR</div><div class="stat-value" id="stat-mrr" style="color: #45C9B0;">$0</div></div>
          <div class="card"><div class="small-text">Monthly burn</div><div class="stat-value" id="stat-burn" style="color: #E8615A;">$0</div></div>
          <div class="card"><div class="small-text">Runway</div><div class="stat-value" id="stat-runway" style="color: #E8A33D;">∞</div></div>
        </div>
        <div class="card"><div style="font-weight: 600; margin-bottom: 12px;">Recent expenses</div><div id="recent-list"></div></div>
      </div>

      <!-- Finances -->
      <div id="tab-finances" class="hidden">
        <div class="section-title">Finances</div>
        <div class="form-group">
          <input type="number" id="cash-input" placeholder="Cash on hand" onchange="updateStats()">
          <input type="text" id="vendor-input" placeholder="Vendor">
          <input type="number" id="amount-input" placeholder="Amount">
          <input type="text" id="category-input" placeholder="Category">
        </div>
        <label style="display: flex; align-items: center; gap: 6px; margin-bottom: 12px; color: #8A8F9C; font-size: 13px;">
          <input type="checkbox" id="recurring-input"> Recurring monthly
        </label>
        <button onclick="addExpense()">+ Add expense</button>
        <div style="margin-top: 24px; font-weight: 600; margin-bottom: 12px;">All expenses</div>
        <div id="expense-list"></div>
      </div>

      <!-- Customers -->
      <div id="tab-customers" class="hidden">
        <div class="section-title">Customers</div>
        <div id="mrr-header" style="font-family: monospace; font-size: 22px; color: #45C9B0; font-weight: 700; margin-bottom: 20px;">$0 MRR</div>
        <div class="form-group">
          <input type="text" id="cust-name-input" placeholder="Customer name">
          <input type="number" id="cust-mrr-input" placeholder="MRR">
          <select id="cust-status-input"><option value="active">Active</option><option value="trial">Trial</option><option value="churned">Churned</option></select>
        </div>
        <button onclick="addCustomer()">+ Add customer</button>
        <div class="cust-grid" id="cust-list" style="margin-top: 20px;"></div>
      </div>

      <!-- Roadmap -->
      <div id="tab-roadmap" class="hidden">
        <div class="section-title">Roadmap</div>
        <div class="form-group">
          <input type="text" id="task-title-input" placeholder="Task title">
          <input type="date" id="task-due-input">
        </div>
        <button onclick="addTask()">+ Add task</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 20px;">
          <div><div class="small-text" style="text-transform: uppercase; font-weight: 600; margin-bottom: 12px;">Backlog · <span id="count-backlog">0</span></div><div id="list-backlog"></div></div>
          <div><div class="small-text" style="text-transform: uppercase; font-weight: 600; margin-bottom: 12px; color: #E8A33D;">In progress · <span id="count-progress">0</span></div><div id="list-progress"></div></div>
          <div><div class="small-text" style="text-transform: uppercase; font-weight: 600; margin-bottom: 12px; color: #45C9B0;">Done · <span id="count-done">0</span></div><div id="list-done"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let state = {
      settings: JSON.parse(localStorage.getItem('hq-settings')) || { cash: 0 },
      expenses: JSON.parse(localStorage.getItem('hq-expenses')) || [],
      customers: JSON.parse(localStorage.getItem('hq-customers')) || [],
      tasks: JSON.parse(localStorage.getItem('hq-tasks')) || []
    };

    function save() {
      localStorage.setItem('hq-settings', JSON.stringify(state.settings));
      localStorage.setItem('hq-expenses', JSON.stringify(state.expenses));
      localStorage.setItem('hq-customers', JSON.stringify(state.customers));
      localStorage.setItem('hq-tasks', JSON.stringify(state.tasks));
      render();
    }

    function addExpense() {
      const vendor = document.getElementById('vendor-input').value.trim();
      const amount = parseFloat(document.getElementById('amount-input').value);
      if (!vendor || !amount) { alert('Vendor and amount required'); return; }
      
      state.expenses.push({
        id: Date.now(),
        date: new Date().toISOString().split('T')[0],
        vendor,
        amount,
        category: document.getElementById('category-input').value || 'Other',
        recurring: document.getElementById('recurring-input').checked
      });
      
      document.getElementById('vendor-input').value = '';
      document.getElementById('amount-input').value = '';
      document.getElementById('category-input').value = '';
      document.getElementById('recurring-input').checked = false;
      
      save();
    }

    function addCustomer() {
      const name = document.getElementById('cust-name-input').value.trim();
      const mrr = parseFloat(document.getElementById('cust-mrr-input').value);
      if (!name) { alert('Name required'); return; }
      
      state.customers.push({
        id: Date.now(),
        name,
        mrr: mrr || 0,
        status: document.getElementById('cust-status-input').value
      });
      
      document.getElementById('cust-name-input').value = '';
      document.getElementById('cust-mrr-input').value = '';
      save();
    }

    function addTask() {
      const title = document.getElementById('task-title-input').value.trim();
      if (!title) { alert('Title required'); return; }
      
      state.tasks.push({
        id: Date.now(),
        title,
        due: document.getElementById('task-due-input').value,
        status: 'backlog'
      });
      
      document.getElementById('task-title-input').value = '';
      document.getElementById('task-due-input').value = '';
      save();
    }

    function fmt(n) { return '$' + Math.round(n).toLocaleString(); }

    function render() {
      state.settings.cash = parseFloat(document.getElementById('cash-input').value) || 0;
      
      const mrr = state.customers.filter(c => c.status === 'active').reduce((s, c) => s + c.mrr, 0);
      const burn = state.expenses.filter(e => e.recurring).reduce((s, e) => s + e.amount, 0);
      const net = burn - mrr;
      const runway = net > 0 ? (state.settings.cash / net).toFixed(1) : '∞';
      
      document.getElementById('stat-cash').textContent = fmt(state.settings.cash);
      document.getElementById('stat-mrr').textContent = fmt(mrr);
      document.getElementById('stat-burn').textContent = fmt(burn);
      document.getElementById('stat-runway').textContent = runway + ' mo';
      document.getElementById('mrr-header').textContent = fmt(mrr) + ' MRR';
      
      const sorted = [...state.expenses].sort((a, b) => b.date.localeCompare(a.date));
      document.getElementById('recent-list').innerHTML = sorted.slice(0, 6).map(e => 
        `<div class="expense-row"><span>${e.vendor}</span><span class="amount">-${fmt(e.amount)}</span></div>`
      ).join('') || '<div class="small-text">No expenses</div>';
      
      document.getElementById('expense-list').innerHTML = sorted.map(e => 
        `<div class="expense-row" style="justify-content: space-between;">
          <div><div>${e.vendor}</div><div class="small-text">${e.date} · ${e.category}</div></div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span class="amount">-${fmt(e.amount)}</span>
            <button onclick="state.expenses = state.expenses.filter(x => x.id !== ${e.id}); save();" style="background: none; border: none; color: #8A8F9C; cursor: pointer; padding: 0; font-weight: normal;">×</button>
          </div>
        </div>`
      ).join('') || '<div class="small-text">No expenses</div>';
      
      document.getElementById('cust-list').innerHTML = state.customers.map(c => 
        `<div class="card"><div style="display: flex; justify-content: space-between;"><strong>${c.name}</strong><button onclick="state.customers = state.customers.filter(x => x.id !== ${c.id}); save();" style="background: none; border: none; color: #8A8F9C; cursor: pointer; padding: 0; font-weight: normal;">×</button></div><div style="font-family: monospace; font-size: 18px; margin: 8px 0;">${fmt(c.mrr)}/mo</div><div class="small-text">Status: ${c.status}</div></div>`
      ).join('') || '<div class="small-text">No customers</div>';
      
      const tasks = { backlog: state.tasks.filter(t => t.status === 'backlog'), progress: state.tasks.filter(t => t.status === 'progress'), done: state.tasks.filter(t => t.status === 'done') };
      document.getElementById('count-backlog').textContent = tasks.backlog.length;
      document.getElementById('count-progress').textContent = tasks.progress.length;
      document.getElementById('count-done').textContent = tasks.done.length;
      
      ['backlog', 'progress', 'done'].forEach(st => {
        document.getElementById(`list-${st}`).innerHTML = tasks[st].map(t => 
          `<div class="card" style="padding: 10px;"><div style="font-weight: 500;">${t.title}</div><div class="small-text">${t.due || 'No due date'}</div><div style="display: flex; gap: 4px; margin-top: 8px;">
            ${st !== 'backlog' ? `<button onclick="state.tasks.find(x => x.id === ${t.id}).status = 'backlog'; save();" style="flex: 1; padding: 4px;">←</button>` : ''}
            ${st !== 'done' ? `<button onclick="state.tasks.find(x => x.id === ${t.id}).status = '${st === 'backlog' ? 'progress' : 'done'}'; save();" style="flex: 1; padding: 4px;">→</button>` : ''}
          </div></div>`
        ).join('');
      });
    }

    function showTab(tab, btn) {
      document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-' + tab).classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function updateStats() {
      render();
    }

    render();
  </script>
</body>
</html>
