<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap HQ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #12141B; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #ECEDF1; }
    :root {
      --bg: #12141B; --surface: #1B1E28; --surface-2: #232733;
      --border: #2E323F; --text: #ECEDF1; --text-dim: #8A8F9C;
      --amber: #E8A33D; --teal: #45C9B0; --red: #E8615A; --violet: #8B7FD9;
    }
    input, select { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none; width: 100%; }
    input[type=checkbox] { width: auto; }
    input::placeholder, select { color: var(--text-dim); }
    select option { background: var(--surface-2); }
    button:disabled { opacity: 0.35; cursor: default; }
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>

  <script>
    const { useState, useEffect, useMemo } = React;

    // localStorage helpers (works on regular websites)
    const KEYS = { settings:'settings', expenses:'expenses', customers:'customers', tasks:'tasks' };

    function loadKey(key, fallback) {
      try { 
        const stored = localStorage.getItem(key);
        return stored ? JSON.parse(stored) : fallback;
      }
      catch(e) { 
        return fallback; 
      }
    }

    function saveKey(key, value) {
      try { 
        localStorage.setItem(key, JSON.stringify(value));
      } catch(e) {
        console.error('localStorage save failed', key, e);
      }
    }

    const uid = () => Math.random().toString(36).slice(2,10);
    const fmtMoney = n => '$' + Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
    const monthKey = d => (d||'').slice(0,7);
    const thisMonth = () => new Date().toISOString().slice(0,7);
    const PALETTE = ['#E8A33D','#45C9B0','#8B7FD9','#E8615A','#5AA9E6','#D9B45A'];
    const ventureColor = (name, list) => PALETTE[list.indexOf(name) % PALETTE.length] || '#8A8F9C';

    // styles
    const h1 = {fontFamily:"'Space Grotesk',sans-serif", fontSize:22, fontWeight:700, margin:0, color:'var(--text)'};
    const h3 = {fontFamily:"'Space Grotesk',sans-serif", fontSize:14, fontWeight:700, marginBottom:10, color:'var(--text)'};
    const inp = {background:'var(--surface-2)', border:'1px solid var(--border)', color:'var(--text)', borderRadius:6, padding:'8px 10px', fontSize:13, fontFamily:'inherit', outline:'none', width:'100%'};
    const btn = {display:'inline-flex', alignItems:'center', gap:6, background:'var(--amber)', color:'#12141B', border:'none', borderRadius:6, padding:'9px 14px', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit'};
    const btnG = {...btn, background:'transparent', color:'var(--text-dim)', border:'1px solid var(--border)'};

    function StatCard({label, value, accent}) {
      return React.createElement('div', {style:{background:'var(--surface)', borderRadius:8, padding:'14px 16px', border:'1px solid var(--border)'}},
        React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', marginBottom:6}}, label),
        React.createElement('div', {style:{fontFamily:"'JetBrains Mono',monospace", fontSize:20, fontWeight:700, color:accent||'var(--text)'}}, value)
      );
    }

    function VentureTag({name, list}) {
      const color = ventureColor(name, list);
      return React.createElement('span', {style:{display:'inline-block', padding:'1px 7px', borderRadius:999, fontSize:11, background:color+'22', color, whiteSpace:'nowrap'}}, name);
    }

    function EmptyState({text}) {
      return React.createElement('div', {style:{padding:'24px', background:'var(--surface)', borderRadius:8, color:'var(--text-dim)', fontSize:13, textAlign:'center', border:'1px dashed var(--border)'}}, text);
    }

    function RunwayGauge({months}) {
      const isInf = months === Infinity;
      const frac = isInf ? 1 : Math.max(0, Math.min(1, months/24));
      const color = isInf ? '#45C9B0' : months < 3 ? '#E8615A' : months < 9 ? '#E8A33D' : '#45C9B0';
      const R = 90, circ = Math.PI*R, dash = frac*circ;
      const needleAngle = -90 + frac*180;
      return React.createElement('div', {style:{background:'var(--surface)', borderRadius:8, padding:'20px 16px 12px', border:'1px solid var(--border)', textAlign:'center'}},
        React.createElement('div', {style:{fontSize:12, color:'var(--text-dim)', marginBottom:4}}, '⛽ Runway'),
        React.createElement('svg', {viewBox:'0 0 240 140', width:'100%', style:{maxWidth:240, display:'block', margin:'0 auto'}},
          React.createElement('path', {d:'M 30 120 A 90 90 0 0 1 210 120', fill:'none', stroke:'var(--surface-2)', strokeWidth:14, strokeLinecap:'round'}),
          React.createElement('path', {d:'M 30 120 A 90 90 0 0 1 210 120', fill:'none', stroke:color, strokeWidth:14, strokeLinecap:'round', strokeDasharray:`${dash} ${circ}`}),
          React.createElement('line', {x1:120,y1:120,x2:120,y2:48,stroke:color,strokeWidth:3,strokeLinecap:'round', transform:`rotate(${needleAngle} 120 120)`}),
          React.createElement('circle', {cx:120,cy:120,r:7,fill:color}),
          React.createElement('text', {x:120,y:108,textAnchor:'middle',fill:'var(--text)',fontFamily:"JetBrains Mono,monospace",fontSize:22,fontWeight:700}, isInf ? '∞' : months.toFixed(1)),
          React.createElement('text', {x:120,y:126,textAnchor:'middle',fill:'var(--text-dim)',fontFamily:'Inter,sans-serif',fontSize:11}, isInf ? 'profitable' : 'months')
        )
      );
    }

    // Dashboard
    function Dashboard({cashOnHand, mrr, monthlyBurn, runwayMonths, expenses, ventures}) {
      const recent = useMemo(() => [...expenses].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,6), [expenses]);
      return React.createElement('div', null,
        React.createElement('h1', {style:h1}, 'Dashboard'),
        React.createElement('p', {style:{color:'var(--text-dim)',fontSize:13,marginTop:4,marginBottom:20}}, 'Your business, at a glance.'),
        React.createElement('div', {style:{display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))', gap:12, marginBottom:24}},
          React.createElement(StatCard, {label:'Cash on hand', value:fmtMoney(cashOnHand)}),
          React.createElement(StatCard, {label:'MRR', value:fmtMoney(mrr), accent:'var(--teal)'}),
          React.createElement(StatCard, {label:'Monthly burn', value:fmtMoney(monthlyBurn), accent:'var(--red)'}),
          React.createElement(StatCard, {label:'Runway', value:runwayMonths===Infinity?'∞':`${runwayMonths.toFixed(1)} mo`, accent:'var(--amber)'}),
        ),
        React.createElement('div', {style:{display:'grid', gridTemplateColumns:'260px 1fr', gap:20, alignItems:'start'}},
          React.createElement(RunwayGauge, {months:runwayMonths}),
          React.createElement('div', null,
            React.createElement('div', {style:{...h3, marginBottom:8}}, 'Recent expenses'),
            recent.length === 0 ? React.createElement(EmptyState, {text:'No expenses yet. Add one from Finances.'}) :
            React.createElement('div', {style:{display:'flex', flexDirection:'column', gap:1}},
              recent.map(e => React.createElement('div', {key:e.id, style:{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 12px', background:'var(--surface)', borderRadius:6}},
                React.createElement('div', null,
                  React.createElement('div', {style:{fontSize:13,fontWeight:500}}, e.vendor||'Untitled'),
                  React.createElement('div', {style:{fontSize:11,color:'var(--text-dim)',display:'flex',gap:6,alignItems:'center',marginTop:2}},
                    e.date, e.venture && React.createElement(VentureTag, {name:e.venture, list:ventures})
                  )
                ),
                React.createElement('span', {style:{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:'var(--red)',flexShrink:0,marginLeft:12}}, `-${fmtMoney(e.amount)}`)
              ))
            )
          )
        )
      );
    }

    // Finances
    function Finances({settings, setSettings, expenses, setExpenses, ventures, monthlyBurn}) {
      const blank = {date:new Date().toISOString().slice(0,10),vendor:'',category:'',venture:'',amount:'',recurring:false};
      const [form, setForm] = useState(blank);
      const addExpense = () => { if(!form.vendor||!form.amount) return; setExpenses(l=>[...l,{...form,id:uid(),amount:Number(form.amount)}]); setForm(blank); };
      const sorted = useMemo(()=>[...expenses].sort((a,b)=>(b.date||'').localeCompare(a.date||'')), [expenses]);
      const byCategory = useMemo(()=>{const m={}; expenses.forEach(e=>{const k=e.category||'Uncategorized'; m[k]=(m[k]||0)+Number(e.amount||0);}); return Object.entries(m).sort((a,b)=>b[1]-a[1]);}, [expenses]);
      const totalSpend = byCategory.reduce((s,[,v])=>s+v,0)||1;
      const cats = ['Software / tools','Hosting','Contractors','Marketing','Legal / admin','Other'];

      return React.createElement('div', null,
        React.createElement('h1', {style:h1}, 'Finances'),
        React.createElement('p', {style:{color:'var(--text-dim)',fontSize:13,marginTop:4,marginBottom:16}}, 'Track spend and know your burn rate.'),
        React.createElement('div', {style:{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}},
          React.createElement('div', {style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',display:'flex',alignItems:'center',gap:10}},
            React.createElement('span', {style:{fontSize:12,color:'var(--text-dim)'}}, 'Cash on hand'),
            React.createElement('input', {type:'number', value:settings.cashOnHand, onChange:e=>setSettings(s=>({...s,cashOnHand:e.target.value})), style:{...inp,width:110,background:'transparent',border:'none',fontFamily:"'JetBrains Mono',monospace",fontSize:15,padding:0}})
          ),
          React.createElement('div', {style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',display:'flex',alignItems:'center',gap:8}},
            React.createElement('span', {style:{fontSize:12,color:'var(--text-dim)'}},'Monthly burn'),
            React.createElement('span', {style:{fontFamily:"'JetBrains Mono',monospace",fontSize:15,color:'var(--red)'}}, fmtMoney(monthlyBurn))
          )
        ),
        React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 260px',gap:24,alignItems:'start'}},
          React.createElement('div', null,
            React.createElement('div', {style:{...h3}}, 'Add expense'),
            React.createElement('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:8,marginBottom:8}},
              React.createElement('input', {style:inp, type:'date', value:form.date, onChange:e=>setForm(f=>({...f,date:e.target.value}))}),
              React.createElement('input', {style:inp, placeholder:'Vendor', value:form.vendor, onChange:e=>setForm(f=>({...f,vendor:e.target.value}))}),
              React.createElement('input', {style:inp, placeholder:'Category', list:'cat-list', value:form.category, onChange:e=>setForm(f=>({...f,category:e.target.value}))}),
              React.createElement('datalist', {id:'cat-list'}, cats.map(c=>React.createElement('option',{key:c,value:c}))),
              React.createElement('input', {style:inp, placeholder:'Venture', list:'ven-list', value:form.venture, onChange:e=>setForm(f=>({...f,venture:e.target.value}))}),
              React.createElement('datalist', {id:'ven-list'}, ventures.map(v=>React.createElement('option',{key:v,value:v}))),
              React.createElement('input', {style:inp, type:'number', placeholder:'Amount ($)', value:form.amount, onChange:e=>setForm(f=>({...f,amount:e.target.value}))})
            ),
            React.createElement('label', {style:{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'var(--text-dim)',marginBottom:12}},
              React.createElement('input', {type:'checkbox', checked:form.recurring, onChange:e=>setForm(f=>({...f,recurring:e.target.checked}))}),
              'Recurring monthly'
            ),
            React.createElement('button', {style:btn, onClick:addExpense}, '+ Add expense'),
            React.createElement('div', {style:{...h3,marginTop:24}}, 'All expenses'),
            sorted.length===0 ? React.createElement(EmptyState, {text:'No expenses yet.'}) :
            React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:1}},
              sorted.map(e=>React.createElement('div', {key:e.id, style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',background:'var(--surface)',borderRadius:6}},
                React.createElement('div', null,
                  React.createElement('div', {style:{fontSize:13,fontWeight:500}}, e.vendor, e.recurring && React.createElement('span',{style:{fontSize:10,color:'var(--amber)',marginLeft:6,background:'#E8A33D22',padding:'1px 5px',borderRadius:4}},'recurring')),
                  React.createElement('div', {style:{fontSize:11,color:'var(--text-dim)',display:'flex',gap:6,alignItems:'center',marginTop:2}}, e.date, ' · ', e.category||'Uncategorized', e.venture && React.createElement(VentureTag,{name:e.venture,list:ventures}))
                ),
                React.createElement('div', {style:{display:'flex',alignItems:'center',gap:8,flexShrink:0}},
                  React.createElement('span',{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:'var(--red)'}},`-${fmtMoney(e.amount)}`),
                  React.createElement('button',{onClick:()=>setExpenses(l=>l.filter(x=>x.id!==e.id)),style:{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',padding:4,fontSize:16}},'×')
                )
              ))
            )
          ),
          React.createElement('div', null,
            React.createElement('div', {style:h3}, 'Spend by category'),
            byCategory.length===0 ? React.createElement(EmptyState,{text:'Nothing yet.'}) :
            React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:10}},
              byCategory.map(([cat,amt])=>React.createElement('div', {key:cat},
                React.createElement('div',{style:{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text-dim)',marginBottom:4}},
                  React.createElement('span',null,cat),
                  React.createElement('span',{style:{fontFamily:"'JetBrains Mono',monospace"}},fmtMoney(amt))
                ),
                React.createElement('div',{style:{height:6,background:'var(--surface-2)',borderRadius:3,overflow:'hidden'}},
                  React.createElement('div',{style:{height:'100%',width:`${(amt/totalSpend)*100}%`,background:'var(--amber)',borderRadius:3}})
                )
              ))
            )
          )
        )
      );
    }

    // Customers
    function Customers({customers, setCustomers,
